syntax = "proto3";

package service_api;

// ---------------------------------------------------------------------------
// Services
// ---------------------------------------------------------------------------

// WifiI2CRelayWriteService handles write-only I2C transactions.
// The client sends a WifiI2CRelayWriteRequest via HTTP POST to /iic.
// The server writes the supplied bytes to the I2C device and returns a
// WifiI2CRelayWriteResponse indicating success or the failure reason.
service WifiI2CRelayWriteService {
    rpc Write(WifiI2CRelayWriteRequest) returns (WifiI2CRelayResponse);
}

// WifiI2CRelayReadService handles read (and combined write-then-read) I2C
// transactions.  The client sends a WifiI2CRelayReadRequest via HTTP GET
// to /iic.
// - If write_data is empty the server performs a plain I2C read of
//   read_size bytes from the device.
// - If write_data is non-empty the server performs an atomic
//   write-then-read: it first transmits write_data to the device, then
//   reads read_size bytes back in a single I2C transaction
//   (i2c_master_transmit_receive).
// The result is returned in WifiI2CRelayResponse.
service WifiI2CRelayReadService {
    rpc Read(WifiI2CRelayReadRequest) returns (WifiI2CRelayResponse);
}

// ---------------------------------------------------------------------------
// Messages
// ---------------------------------------------------------------------------

// WifiI2CRelayWriteRequest is sent by the client to write data to an I2C
// device.
//   address    – 7-bit I2C device address.
//   timeout_ms – transaction timeout in milliseconds.
//   write_data – bytes to transmit to the device.
message WifiI2CRelayWriteRequest {
    uint32 address = 1;
    uint32 timeout_ms = 2;
    bytes write_data = 3;
}

// WifiI2CRelayResponse is the unified response for both write and read
// transactions.
//   result – outcome of the transaction (see Result enum).
//   data   – bytes received from the device.  Populated only for read
//             transactions on SUCCESS; empty for write transactions.
message WifiI2CRelayResponse {
    Result result = 1;
    bytes data = 2;
}

// WifiI2CRelayReadRequest is sent by the client to read data from an I2C
// device.
//   address    – 7-bit I2C device address.
//   timeout_ms – transaction timeout in milliseconds.
//   write_data – optional register/command bytes to transmit before reading.
//                Leave empty for a plain read; set to trigger an atomic
//                write-then-read (i2c_master_transmit_receive).
//   read_size  – number of bytes to read back from the device.
message WifiI2CRelayReadRequest {
    uint32 address = 1;
    uint32 timeout_ms = 2;
    bytes write_data = 3;
    uint32 read_size = 4;
}

// Result encodes the outcome of an I2C transaction.
//   SUCCESS     – transaction completed successfully.
//   BAD_REQUEST – the request was malformed or the requested size exceeds the
//                 internal buffer limit (128 bytes).
//   TIMEOUT     – the I2C device did not respond within timeout_ms.
//   FAILURE     – the transaction failed for any other reason.
enum Result {
    SUCCESS = 0;
    BAD_REQUEST = 1;
    TIMEOUT = 2;
    FAILURE = 3;
}