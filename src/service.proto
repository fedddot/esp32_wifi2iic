syntax = "proto3";

package service_api;

service WifiI2CRelayWriteService {
    rpc Write(WifiI2CRelayWriteRequest) returns (WifiI2CRelayWriteResponse);
}

service WifiI2CRelayReadService {
    rpc Read(WifiI2CRelayReadRequest) returns (WifiI2CRelayReadResponse);
}

message WifiI2CRelayWriteRequest {
    uint32 address = 1;
    uint32 timeout_ms = 2;
    bytes data = 3;
}

message WifiI2CRelayWriteResponse {
    Result result = 1;
}

message WifiI2CRelayReadRequest {
    uint32 address = 1;
    uint32 timeout_ms = 2;
    uint32 length = 3;
}

message WifiI2CRelayReadResponse {
    Result result = 1;
    bytes data = 2;
}

enum Result {
    SUCCESS = 0;
    BAD_REQUEST = 1;
    FAILURE = 2;
}