name: on PR to main
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main", "epic/*" ]

env:
  BUILD_TYPE: Release
  CONTAINER_SRC_DIR: /workspace
  CONTAINER_BIN_DIR: /build
  WORKSPACE_BIN_DIR: ${{github.workspace}}/bin

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: retrieve user and group id
      id: get_ids
      run: |
        echo "runner_uid=$(id -u)" >> $GITHUB_OUTPUT
        echo "runner_gid=$(id -g)" >> $GITHUB_OUTPUT
        echo "runner_user=$(id -un)" >> $GITHUB_OUTPUT

    - name: build dev image
      id: build_dev_image
      uses: docker/build-push-action@v3
      with:
        build-args: |
          UID=${{steps.get_ids.outputs.runner_uid}}
          GID=${{steps.get_ids.outputs.runner_gid}}
          USERNAME=${{steps.get_ids.outputs.runner_user}}
        tags: esp-builder:latest
        file: ${{github.workspace}}/docker/dev.dockerfile
        target: builder

    - name: cmake config
      working-directory: ${{github.workspace}}
      run: |
        mkdir -p ${{env.WORKSPACE_BIN_DIR}}
        docker run -i -v ${{github.workspace}}:${{env.CONTAINER_SRC_DIR}} -v ${{env.WORKSPACE_BIN_DIR}}:${{env.CONTAINER_BIN_DIR}} --entrypoint bash ${{steps.build_dev_image.outputs.imageid}} -c "source /opt/esp/idf/export.sh && cmake -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -DNETWORK_SSID=TestNetwork -DNETWORK_PASSWORD=TestPassword -S ${{env.CONTAINER_SRC_DIR}} -B ${{env.CONTAINER_BIN_DIR}}"
    
    - name: build
      working-directory: ${{github.workspace}}
      run: |
        docker run -i -v ${{github.workspace}}:${{env.CONTAINER_SRC_DIR}} -v ${{env.WORKSPACE_BIN_DIR}}:${{env.CONTAINER_BIN_DIR}} --entrypoint bash ${{steps.build_dev_image.outputs.imageid}} -c "source /opt/esp/idf/export.sh && cmake --build ${{env.CONTAINER_BIN_DIR}} -j $(nproc)"